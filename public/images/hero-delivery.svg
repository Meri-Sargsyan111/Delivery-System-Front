<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ambient glows -->
  <circle cx="60" cy="60" r="170" fill="url(#glowPurple)"/>
  <circle cx="486" cy="420" r="190" fill="url(#glowCyan)"/>

  <!-- dashboard / map card -->
  <rect x="50" y="50" width="380" height="380" rx="28" fill="#1e293b" stroke="rgba(255,255,255,0.08)" filter="url(#softShadow)"/>
  <circle cx="78" cy="78" r="4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="94" cy="78" r="4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="110" cy="78" r="4" fill="rgba(255,255,255,0.18)"/>

  <!-- route rings -->
  <circle cx="90" cy="400" r="26" fill="none" stroke="url(#gPurple)" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4"/>
  <circle cx="330" cy="130" r="34" fill="none" stroke="url(#gCyan)" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5"/>

  <!-- dashed route path -->
  <path d="M90,400 C140,350 150,290 210,265 C260,245 290,200 330,130" fill="none" stroke="url(#gCyan)" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 12"/>

  <!-- origin marker (package) -->
  <g transform="translate(90,400)">
    <rect x="-14" y="-14" width="28" height="28" rx="6" fill="url(#gPurple)"/>
    <path d="M-14,-4 L14,-4" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <path d="M0,-14 L0,14" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  </g>

  <!-- destination marker (pin) -->
  <g transform="translate(330,130)">
    <path d="M0,0 C-14,-18 -24,-30 -24,-44 C-24,-58 -13,-68 0,-68 C13,-68 24,-58 24,-44 C24,-30 14,-18 0,0 Z" fill="url(#gCyan)"/>
    <circle cx="0" cy="-44" r="9" fill="#0f172a"/>
  </g>

  <!-- delivery van -->
  <g transform="translate(190,300) rotate(-20) scale(0.85)">
    <line x1="-96" y1="-4" x2="-72" y2="-4" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-104" y1="8" x2="-76" y2="8" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-98" y1="20" x2="-78" y2="20" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>

    <rect x="-56" y="32" width="118" height="4" rx="2" fill="#0f172a" opacity="0.5"/>

    <rect x="-70" y="-40" width="100" height="54" rx="10" fill="url(#gPurple)"/>
    <rect x="-70" y="-6" width="100" height="6" fill="rgba(255,255,255,0.25)"/>

    <rect x="30" y="-24" width="46" height="38" rx="8" fill="url(#gCyan)"/>
    <rect x="38" y="-18" width="22" height="16" rx="4" fill="#0f172a" opacity="0.55"/>
    <rect x="70" y="-2" width="8" height="8" rx="2" fill="#fde68a"/>

    <circle cx="-40" cy="20" r="13" fill="#0f172a" stroke="url(#gPurple)" stroke-width="4"/>
    <circle cx="-40" cy="20" r="4" fill="#1e293b"/>
    <circle cx="48" cy="20" r="13" fill="#0f172a" stroke="url(#gPurple)" stroke-width="4"/>
    <circle cx="48" cy="20" r="4" fill="#1e293b"/>
  </g>

  <!-- floating card: order confirmed -->
  <rect x="340" y="54" width="182" height="76" rx="18" fill="#111827" stroke="rgba(255,255,255,0.1)" filter="url(#softShadow)"/>
  <circle cx="376" cy="92" r="17" fill="url(#gPurple)"/>
  <path d="M368,92 L374,98 L386,84" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="402" y="88" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Order Confirmed</text>
  <text x="402" y="106" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">#DS-2419 &#183; On the way</text>

  <!-- floating card: live eta -->
  <rect x="10" y="352" width="176" height="66" rx="18" fill="#111827" stroke="rgba(255,255,255,0.1)" filter="url(#softShadow)"/>
  <circle cx="46" cy="385" r="5" fill="#22d3ee"/>
  <circle cx="46" cy="385" r="5" fill="none" stroke="#22d3ee" stroke-width="2">
    <animate attributeName="r" values="5;16;5" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="68" y="380" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f1f5f9">Live Tracking</text>
  <text x="68" y="398" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">ETA 8 min</text>

  <!-- floating card: rating -->
  <rect x="20" y="190" width="124" height="50" rx="16" fill="#111827" stroke="rgba(255,255,255,0.1)" filter="url(#softShadow)"/>
  <path d="M44,206 L46.6,212.2 L53,212.9 L48,217.1 L49.5,223.6 L44,220 L38.5,223.6 L40,217.1 L35,212.9 L41.4,212.2 Z" fill="#f59e0b"/>
  <text x="64" y="211" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">4.9</text>
  <text x="64" y="227" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Top Rated</text>
</svg>