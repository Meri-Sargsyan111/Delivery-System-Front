<div class="page-header">
  <h1><i class="bi bi-bell"></i> {{ 'notifications.title' | t }}</h1>
  <p class="subtitle">{{ 'notifications.total' | t: { count: notifications.length } }}</p>
</div>

<div class="notification-list">

  @for (notification of notifications; track notification) {

  <div class="notification-card">
    <div class="notification-icon"><i class="bi bi-info-circle"></i></div>
    <div class="notification-text">{{ notification }}</div>
  </div>

  } @empty {

  <div class="empty-state">
    <i class="bi bi-bell-slash"></i>
    <p>{{ 'notifications.empty' | t }}</p>
  </div>

  }

</div>
