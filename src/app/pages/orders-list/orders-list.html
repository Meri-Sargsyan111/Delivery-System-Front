<div class="container mt-4">

  <h1 class="mb-4">📦 Orders List</h1>

  <div class="row mb-3">

    <div class="col-md-4">
      <input
        #searchInput
        type="text"
        class="form-control"
        placeholder="🔍 Search Customer..."
        (input)="searchOrders(searchInput.value)">
    </div>

  </div>

  <div class="card shadow">

    <div class="card-body">

      <h5 class="card-title">
        Total Orders: {{ orders.length }}
      </h5>

      <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        @for (order of orders; track order.id) {

        <tr>

          <td>{{ order.id }}</td>
          <td>{{ order.customerName }}</td>
          <td>{{ order.fromAddress }}</td>
          <td>{{ order.toAddress }}</td>
          <td>{{ order.status }}</td>

          <td>

            <button
              class="btn btn-success btn-sm me-2"
              (click)="deliverOrder(order.id)">
              Deliver
            </button>

            <button
              class="btn btn-danger btn-sm"
              (click)="cancelOrder(order.id)">
              Cancel
            </button>

          </td>

        </tr>

        }

        </tbody>

      </table>

    </div>

  </div>

</div>
