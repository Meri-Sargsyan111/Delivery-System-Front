<div class="app-shell" [class.chromeless]="isChromeless()">

  @if (!isChromeless()) {
    <app-navbar></app-navbar>
  }

  <div class="app-main">

    @if (!isChromeless()) {
      <header class="app-toolbar">

        <div class="app-toolbar-title">
          <i class="bi" [ngClass]="sectionTitle().icon"></i>
          <span>{{ sectionTitle().key | t }}</span>
        </div>

        <div class="app-toolbar-actions">

          <a class="app-toolbar-bell" routerLink="/notifications" [attr.aria-label]="'nav.notifications' | t">
            <i class="bi bi-bell"></i>
          </a>

          @if (currentUser()) {
            <div class="app-toolbar-user" [title]="userIdentifier()">
              <span class="app-toolbar-user-avatar">{{ userInitial() }}</span>
              <span class="app-toolbar-user-role">{{ roleKey() | t }}</span>
            </div>
          }

        </div>

      </header>
    }

    <main class="app-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
